<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}后台管理{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}" />
  </head>
  <body>
    <div class="admin-shell">
      {% if g.admin_user %}
        <header class="admin-topbar">
          <div>
            <div class="eyebrow">SYNTHETIC_FRONTIER</div>
            <h1>后台管理</h1>
          </div>
          <nav>
            <a href="{{ url_for('public.index') }}" target="_blank" rel="noreferrer">查看前台</a>
            <a href="{{ url_for('admin.dashboard') }}">资源列表</a>
            <a href="{{ url_for('admin.site_settings') }}">二维码配置</a>
            <a href="{{ url_for('admin.logout') }}">退出登录</a>
          </nav>
        </header>
      {% endif %}

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="flash-stack">
            {% for category, message in messages %}
              <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </div>
  </body>
</html>
